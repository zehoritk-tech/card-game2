<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>משחק קלפים לכיתה</title>

<style>
body{
  font-family: Arial;
  direction: rtl;
  text-align: center;
  background:#f5f5f5;
}

h2{margin:15px;}

.grid{
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:10px;
  max-width:900px;
  margin:20px auto;
}

.card{
  width:100%;
  aspect-ratio: 3/4;
  perspective:1000px;
}

.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 0.6s;
  cursor:pointer;
}

.card.flipped .inner{
  transform: rotateY(180deg);
}

.face{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
  box-sizing:border-box;
}

.front{
  background:#ddd;
  font-size:18px;
}

.back{
  background:white;
  transform: rotateY(180deg);
  flex-direction:column;
}

.back img{
  max-width:100%;
  max-height:70%;
  border-radius:8px;
  cursor: zoom-in;
}

.back .text{
  margin-top:10px;
  font-size:14px;
}

#modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#modal img{
  max-width:95%;
  max-height:95%;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>משחק קלפים</h2>

<div id="game" class="grid"></div>

<div id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>

const cards = [
  {
    image: "https://drive.google.com/file/d/1g0dORNovIh8HSjgt078oojrAw-2JQajd/view?usp=sharing",
    text: "מתרעננים באלקטרוסטטיקה"
  },
  {
    image: "https://drive.google.com/file/d/17hyOIw_O7gLNbEvhDXKONZ6Itf7-EM2-/view?usp=sharing",
    text: "מתרעננים באלקטרוסטטיקה"
  },
  {
    image: "https://via.placeholder.com/300x200?text=Card+3",
    text: "מתרעננים באלקטרוסטטיקה"
  },
  {
    image: "https://via.placeholder.com/300x200?text=Card+4",
    text: "מתרעננים באלקטרוסטטיקה"
  },
  {
    image: "https://via.placeholder.com/300x200?text=Card+5",
    text: "מתרעננים באלקטרוסטטיקה"
  }
];

function buildGame(){
  const game = document.getElementById("game");
  game.innerHTML = "";

  let order = [...cards.keys()];
  for(let i=order.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [order[i],order[j]]=[order[j],order[i]];
  }

  order.forEach(i=>{
    let c = cards[i];

    let card = document.createElement("div");
    card.className="card";

    card.innerHTML = `
      <div class="inner" onclick="this.parentElement.classList.toggle('flipped')">
        <div class="face front">לחץ כדי להפוך</div>
        <div class="face back">
          <img src="${c.image}" onclick="openModal(event,'${c.image}')">
          <div class="text">${c.text}</div>
        </div>
      </div>
    `;

    game.appendChild(card);
  });
}

function openModal(event,src){
  event.stopPropagation();
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=src;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

buildGame();

</script>

</body>
</html>
