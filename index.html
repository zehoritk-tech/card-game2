<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>משחק קלפים משופר</title>

<style>
body{
  font-family: Arial, sans-serif;
  direction: rtl;
  text-align: center;
  background:#f5f5f5;
  margin: 0;
  padding: 20px;
}

h2{margin:15px; color: #333;}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap:15px;
  max-width:1000px;
  margin:20px auto;
}

.card{
  width:100%;
  aspect-ratio: 3/4;
  perspective:1000px;
}

.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 0.6s;
  cursor:pointer;
}

.card.flipped .inner{
  transform: rotateY(180deg);
}

.face{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
  box-sizing:border-box;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

/* עיצוב הצד הקדמי - ברירת מחדל */
.front{
  background: linear-gradient(135deg, #ff4b2b, #ff416c);
  color: white;
  font-size: 18px;
  font-weight: bold;
}

/* עיצוב קלף שכבר ביקרו בו */
.card.visited .front {
  background: #bdc3c7 !important;
  color: #7f8c8d;
}

.back{
  background: white;
  transform: rotateY(180deg);
  flex-direction:column;
  border: 2px solid #ddd;
}

.back img{
  max-width: 100%;
  max-height: 70%;
  border-radius: 5px;
  cursor: zoom-in;
}

.back .text{
  margin-top:10px;
  font-size:16px;
  color: #333;
}

#editor{
  margin-top:40px;
  background:white;
  padding:20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

#modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#modal img{
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<h2>משחק קלפים</h2>
<p>פתחו קלף אחד בכל פעם. יש לסגור קלף כדי לפתוח אחד חדש.</p>

<div id="game" class="grid"></div>

<div id="editor"></div>

<div id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>

const MAX = 10;
let openedCard = null;

let cards = JSON.parse(localStorage.getItem("cards")) || Array.from({length: MAX}, () => ({
  image:"",
  text:""
}));

function save(){
  localStorage.setItem("cards", JSON.stringify(cards));
}

function isTeacherMode(){
  const params = new URLSearchParams(window.location.search);
  return params.get("teacher") === "1";
}

function buildEditor(){
  const editor = document.getElementById("editor");
  editor.innerHTML = "<h3>עריכת קלפים (מצב מורה)</h3>";

  cards.forEach((c,i)=>{
    editor.innerHTML += `
      <div style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">
        <b>קלף ${i+1}</b><br>
        <input type="text" placeholder="טקסט לקלף" value="${c.text}" 
               style="width:200px; padding:5px;"
               onchange="cards[${i}].text=this.value;save()">
        <input type="file" onchange="loadImage(event,${i})">
      </div>
    `;
  });
}

function loadImage(event,i){
  let reader = new FileReader();
  reader.onload = function(){
    cards[i].image = reader.result;
    save();
    buildEditor();
  };
  reader.readAsDataURL(event.target.files[0]);
}

function buildGame(){
  const game = document.getElementById("game");
  game.innerHTML = "";

  let order = [...cards.keys()];
  // ערבוב
  for(let i=order.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [order[i],order[j]]=[order[j],order[i]];
  }

  order.forEach(i=>{
    let c = cards[i];
    let card = document.createElement("div");
    card.className="card";

    card.innerHTML = `
      <div class="inner">
        <div class="face front">?</div>
        <div class="face back">
          ${c.image ? `<img src="${c.image}" onclick="openModal(event,'${c.image}')">` : ''}
          <div class="text">${c.text || '(ריק)'}</div>
        </div>
      </div>
    `;

    card.addEventListener("click", () => handleCard(card));
    game.appendChild(card);
  });
}

function handleCard(card){
  // 1. אם לוחצים על הקלף שכבר פתוח - סוגרים אותו וצובעים באפור
  if(openedCard === card){
    card.classList.remove("flipped");
    card.classList.add("visited"); // הופך לאפור
    openedCard = null;
    return;
  }

  // 2. אם מנסים לפתוח קלף חדש כשיש אחד פתוח - חוסמים
  if(openedCard !== null){
    return; 
  }

  // 3. פתיחת קלף
  card.classList.add("flipped");
  openedCard = card;
}

function openModal(event,src){
  event.stopPropagation();
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=src;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

// הפעלה
buildGame();

if(isTeacherMode()){
  document.getElementById("editor").style.display="block";
  buildEditor();
} else {
  document.getElementById("editor").style.display="none";
}

</script>

</body>
</html>
