<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>מתרעננים באלקטרוסטטיקה</title>

<style>

body{
  font-family: Arial;
  direction: rtl;
  text-align: center;
  background:linear-gradient(135deg, #f6f9ff, #e6ecff);
}

h2{
  margin:15px 15px 5px 15px;
}

.instructions{
  font-size:16px;
  color:#444;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:10px;
  max-width:900px;
  margin:20px auto;
}

.card{
  width:100%;
  aspect-ratio: 3/4;
  perspective:1000px;
}

.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 0.6s;
  cursor:pointer;
}

.card.flipped .inner{
  transform: rotateY(180deg);
}

.face{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
  box-sizing:border-box;
  border:1px solid black;
}

.front{
  background:linear-gradient(135deg, #fff5f7, #e6b7c3);
  font-size:18px;
}

.back{
  background:white;
  transform: rotateY(180deg);
  flex-direction:column;
}

.back img{
  max-width:100%;
  max-height:70%;
  border-radius:8px;
  cursor:zoom-in;
}

.back .text{
  margin-top:10px;
  font-size:14px;
}

/* קלף שכבר נסגר */
.card.used .front{
  background:#999;
  color:white;
}

#modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:999;
}

#modal img{
  max-width:95%;
  max-height:95%;
  border-radius:10px;
}

</style>
</head>

<body>

<h2>מתרעננים באלקטרוסטטיקה בעזרת תמונות</h2>

<div class="instructions">
לחצו על קלף כדי להפוך אותו. לחצו במרכזו כדי לצפות בו בהגדלה.
<br>
על מנת לצפות בקלף הבא הפכו בחזרה את הקלף הפתוח.
</div>

<div id="game" class="grid"></div>

<div id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>

const cards = [
  {
    image: "https://raw.githubusercontent.com/zehoritk-tech/card-game2/main/images/1.png",
    text: "מתרעננים באלקטרוסטטיקה"
  },
  {
    image: "https://raw.githubusercontent.com/zehoritk-tech/card-game2/main/images/2.png",
    text: "מתרעננים באלקטרוסטטיקה"
  },
  {
    image: "https://raw.githubusercontent.com/zehoritk-tech/card-game2/main/images/3.png",
    text: "מתרעננים באלקטרוסטטיקה"
  },
  {
    image: "https://raw.githubusercontent.com/zehoritk-tech/card-game2/main/images/4.png",
    text: "מתרעננים באלקטרוסטטיקה"
  },
  {
    image: "https://raw.githubusercontent.com/zehoritk-tech/card-game2/main/images/5.png",
    text: "מתרעננים באלקטרוסטטיקה"
  },
  {
    image: "https://raw.githubusercontent.com/zehoritk-tech/card-game2/main/images/6.png",
    text: "מתרעננים באלקטרוסטטיקה"
  },
  {
    image: "https://raw.githubusercontent.com/zehoritk-tech/card-game2/main/images/7.png",
    text: "מתרעננים באלקטרוסטטיקה"
  },
  {
    image: "https://raw.githubusercontent.com/zehoritk-tech/card-game2/main/images/8.png",
    text: "מתרעננים באלקטרוסטטיקה"
  },
  {
    image: "https://raw.githubusercontent.com/zehoritk-tech/card-game2/main/images/9.png",
    text: "מתרעננים באלקטרוסטטיקה"
  },
  {
    image: "https://raw.githubusercontent.com/zehoritk-tech/card-game2/main/images/10.png",
    text: "מתרעננים באלקטרוסטטיקה"
  }
];

let openCard = null;

function buildGame(){

  const game = document.getElementById("game");
  game.innerHTML = "";

  let order = [...cards.keys()];

  // ערבוב קלפים
  for(let i = order.length - 1; i > 0; i--){

    let j = Math.floor(Math.random() * (i + 1));

    [order[i], order[j]] = [order[j], order[i]];
  }

  order.forEach(i => {

    let c = cards[i];

    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="inner">

        <div class="face front">
          <b>לחצו כדי להפוך</b>
        </div>

        <div class="face back">
          <img src="${c.image}" onclick="openModal(event,'${c.image}')">

          <div class="text">
            ${c.text}
          </div>
        </div>

      </div>
    `;

    card.addEventListener("click", () => toggleCard(card));

    game.appendChild(card);
  });
}

function toggleCard(card){

  // אם יש כבר קלף פתוח אחר
  if(openCard && openCard !== card){
    return;
  }

  // אם הקלף פתוח → סוגרים ומאפירים
  if(card.classList.contains("flipped")){

    card.classList.remove("flipped");

    card.classList.add("used");

    openCard = null;
  }

  // אחרת פותחים אותו
  else{

    card.classList.add("flipped");

    openCard = card;
  }
}

function openModal(event, src){

  event.stopPropagation();

  document.getElementById("modal").style.display = "flex";

  document.getElementById("modalImg").src = src;
}

function closeModal(){

  document.getElementById("modal").style.display = "none";
}

buildGame();

</script>

</body>
</html>
